  - type: Features
    data:
      - AutoWrite for paragraph generation on any topic
      - TypeAhead context-aware sentence completion
      - HyperChat conversational AI
      - Email Response auto-reply drafting
      - AI Document Editor for long-form writing
      - Scholar AI research with peer-reviewed citations
      - 100+ pre-built writing tools (summarize, rewrite, etc.)
      - Custom user-built AI tools
      - Personal Assistant agent that controls the browser
      - Agent capabilities - Gmail inbox triage, LinkedIn research, flight booking, food ordering, bill payment
      - Chrome extension for in-page assistance across the web
      - Premium $19.99/mo (250 messages, 3 personas, citations)
      - Ultra $44.99/mo (unlimited messages, 10 personas, experimental features)
      - Annual plans with 20% discount
      - Built by OthersideAI
